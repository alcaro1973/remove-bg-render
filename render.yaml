services:
  - type: web
    name: bg-remove-api
    runtime: docker
    repo: https://github.com/alcaro1973/remove-bg-render # Substitua pelo nome correto
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NODE_VERSION
        value: 18.x
